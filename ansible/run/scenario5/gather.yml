- hosts: inetfw, corpdns
  roles:
    - kyoushi-gather
  vars:
    kyoushi_gather_ignore_errors: yes
    kyoushi_gather_configs:
      - src: /var/lib/suricata
        recursive: true
      - src: /etc
        recursive: true
        exclude:
          - "/etc/runit "
          - "/etc/sv "
      - src: /var/ossec/etc/ossec.conf

    kyoushi_gather_logs:
      - src: /var/log
        recursive: true


- hosts: videoserver
  roles:
    - kyoushi-gather
  vars:
    kyoushi_gather_ignore_errors: yes
    kyoushi_gather_logs:
      - /var/www/default/log/
      - src: /var/log
        recursive: true

    kyoushi_gather_configs:
      - src: /etc
        recursive: true
        exclude:
          - "/etc/runit "
          - "/etc/sv "
      - src: /var/ossec/etc/ossec.conf


# NOTE: In scenario 5, the attacker does not use the usual attacker machine
# (192.42.1.174). Instead, the attack is carried out from a LAN Turtle device
# (192.168.100.27) deployed inside the LAN network.
#
# This means the ansible hosts file must be updated to point the 'attacker' host
# to 192.168.100.27 instead of the default 192.42.1.174, otherwise Ansible cannot
# reach the machine and log gathering will fail silently or error out.
- hosts: attacker
  roles:
    - kyoushi-gather
  vars:
    kyoushi_gather_ignore_errors: yes
    kyoushi_gather_logs:
      - /home/aecid/attackmate.log
      - /home/aecid/output.log
      - /home/aecid/attackmate.json
      - src: /var/log
        recursive: true

    kyoushi_gather_configs:
      - src: /home/aecid/scenario_5.yml
      - src: /var/www/html
        recursive: true
      - src: /etc
        recursive: true
        exclude:
          - "/etc/runit "
          - "/etc/sv "

- hosts: wazuh
  roles:
    - kyoushi-gather
  vars:
    kyoushi_gather_ignore_errors: yes
    kyoushi_gather_logs:
      - src: /var/ossec/logs/alerts
        recursive: true

    kyoushi_gather_configs:
      - src: /etc
        recursive: true
        exclude:
          - "/etc/runit "
          - "/etc/sv "
      - src: /var/ossec/etc/shared
        recursive: true

- hosts: adminpc
  roles:
    - kyoushi-gather
  vars:
    kyoushi_gather_ignore_errors: yes
    kyoushi_gather_logs:
      - /home/aecid/attackmate.log
      - /home/aecid/output.log
      - src: /var/log
        recursive: true

    kyoushi_gather_configs:
      - src: /home/aecid/login.yml
      - src: /etc
        recursive: true
        exclude:
          - "/etc/runit "
          - "/etc/sv "

