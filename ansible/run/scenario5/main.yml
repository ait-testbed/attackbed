- name: Start attackmate on Admin PC
  hosts: adminpc
  become: true
  become_user: aecid
  vars:
    user: "aecid"
    home_path: "/home/{{ user }}"
    venv_path: "/usr/local/share/attackmate/venv"
    delay_before_login: 60
  tasks:

    - name: Copy playbook to adminpc1
      ansible.builtin.copy:
        src: "files/login.yml"
        dest: "{{ home_path }}/login.yml"
        mode: '0644'
        owner: "{{ user }}"
        group: "{{ user }}"


