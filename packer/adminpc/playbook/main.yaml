- name: Install AdminPC
  hosts: all
  become: true
  vars:
    user: aecid
    attacker_home: "/home/{{ user }}"
    venv_path: "/usr/local/share/attackmate/venv"
  tasks:
          - name: Allow password login
            ansible.builtin.copy:
              dest: /etc/ssh/sshd_config.d/password.conf
              content: 'PasswordAuthentication yes'
          - name: Install at scheduler
            ansible.builtin.apt:
              name: at
              state: present
          - name: Ensure ownership of .config is aecid:aecid
            file:
              path: /home/{{ user }}/.config
              owner: "{{ user }}"
              group: "{{ user }}"
              recurse: yes

      # Update apt cache so we get the latest packages
          - name: Update apt cache for Playwright
            become: true
            ansible.builtin.apt:
              update_cache: yes
              cache_valid_time: 3600
            when: attackmate_playwright
            tags:
              - install
              - playwright

          # Install the system‐level libraries Playwright needs
          - name: Install system dependencies for Playwright
            become: true
            ansible.builtin.package:
              name: "{{ playwright_dependencies }}"
              state: present
            when: attackmate_playwright
            tags:
              - install
              - playwright

          # Install the Python Playwright package into our virtualenv using uv
          - name: Install Playwright Python package in venv (uv)
            become: true
            ansible.builtin.shell:
              chdir: "{{ attackmate_dest }}"
              cmd: "uv pip install --python .venv/bin/python {{ attackmate_playwright_pip_packages | join(' ') }}"
            when: attackmate_playwright
            tags:
              - install
              - playwright
              - molecule-idempotence-notest

          - name: Install system dependencies via playwright install-deps
            command: /usr/local/share/attackmate/.venv/bin/playwright install-deps
            when: (ansible_distribution != "Debian" or ansible_distribution_major_version != "13") and ansible_distribution != "Kali"
            tags:
              - install
              - playwright
              - molecule-idempotence-notest

          - name: Ensure shared Playwright browser cache dir exists
            become: true
            ansible.builtin.file:
              path: "{{ attackmate_playwright_browser_cache }}"
              state: directory
              mode: '1777'
            when: attackmate_playwright
            tags:
              - playwright

          - name: Install Playwright browsers (shared path)
            become: true
            ansible.builtin.shell:
              chdir: "{{ attackmate_dest }}"
              cmd: 'PLAYWRIGHT_BROWSERS_PATH="{{ attackmate_playwright_browser_cache }}" {{ attackmate_dest }}/.venv/bin/playwright install'
            when: attackmate_playwright
            tags:
              - install
              - playwright
              - molecule-idempotence-notest

          - name: Export PLAYWRIGHT_BROWSERS_PATH system-wide
            become: true
            ansible.builtin.copy:
              dest: /etc/profile.d/playwright_browsers_path.sh
              content: |
                export PLAYWRIGHT_BROWSERS_PATH="{{ attackmate_playwright_browser_cache }}"
              mode: '0644'
            tags:
              - playwright
              - environment


          - name: Recursively change ownership
            file:
              path:  /usr/local/share/attackmate
              state: directory
              recurse: yes
              mode : 0775
              owner: "{{ user }}"
              group: "{{ user }}"

  roles:
          - role: aeciduser
            vars:
                  # pass: aecid
                  aeciduser_pass: "$6$9AqxTPJqYsFXwgPN$xAC4y1Vndk00EaBCuFcJC37BYDYYVAgt9SHymg15KSdKddZnwG.SsQaJvHarH4DYQj3tuboeLa4G5EfL7itcC0"
          - role: aecidtools
            vars:
                  aecidtools_user: "aecid"
          - role: manage_unattended_upgrades
          - role: hostname
            vars:
                  hostname: admin
                  hostname_ip: 10.12.0.222
                  hostname_fqdn: admin.attackbed.local
          - role: attackmate
            vars:
              attackmate_msf_server: "localhost"
              attackmate_msf_passwd: "hackerman"
              attackmate_sliver_config: "/home/aecid/.sliver-client/configs/aecid_localhost.cfg"
              attackmate_tmux_session: "aecid"
              attackmate_playwright: True
          - role: mate-desktop
          - role: novnc
          - role: collectd
          - role: acct
          - role: rootkeys
            vars:
                  rootkeys_install_public: False
                  rootkeys_install_private: True
                  rootkeys_private_key_user: aecid
                  rootkeys_private_dir: "/home/aecid/.ssh"
